services:
  - type: web
    name: reispetos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase: {name: reispetos-db, property: connectionString}
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://SEU-FRONTEND.vercel.app
databases:
  - name: reispetos-db
    plan: free
